<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Site</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial;
      background-color: white;
      color: black;
      padding: 20px;
    }
  </style>
</head>
<body>
       <!--header-->
    <header>
    <div class="logo1">Explore Places</div>
    <div class="logo2">Desired Vacation Country</div>
    </header>
     <!--Containers-->
        <div class="container">
            <div class="item item-1">
              <span class="item-label">Thailand</span>
              <svg class="search-icon" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"/>
                <line x1="16.5" y1="16.5" x2="22" y2="22"/>
              </svg>
            </div>

            <div class="item item-2">
              <span class="item-label">Maldives</span>
              <svg class="search-icon" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"/>
                <line x1="16.5" y1="16.5" x2="22" y2="22"/>
              </svg>
            </div>

            <div class="item item-3">
              <span class="item-label">Japan</span>
              <svg class="search-icon" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"/>
                <line x1="16.5" y1="16.5" x2="22" y2="22"/>
              </svg>
            </div>
            
            <div class="item item-4">
              <span class="item-label">Dubai</span>
              <svg class="search-icon" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"/>
                <line x1="16.5" y1="16.5" x2="22" y2="22"/>
              </svg>
            </div>

            <div class="item item-5">
              <span class="item-label">Switzerland</span>
              <svg class="search-icon" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"/>
                <line x1="16.5" y1="16.5" x2="22" y2="22"/>
              </svg>
            </div>

            <div class="item item-6">
              <span class="item-label">Paris</span>
              <svg class="search-icon" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"/>
                <line x1="16.5" y1="16.5" x2="22" y2="22"/>
              </svg>
            </div>
        </div>
    <style>
        
    header {
      background-color: white;
      padding: 25px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
    }
    header .logo1 {
      font-size: 30px;
      font-weight: bold;
      color: rgb(29, 78, 216);;
    }
    header .logo2 {
      font-size: 45px;
      font-weight: bold;
      color: rgb(29, 78, 216);;
    }

    .container {
      display: grid;
      gap: 16.5px;
      margin: 40px auto;
      padding: 0 20px;
      max-width: 900px;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 120px;
    }
    .item {
      display: grid;
      place-items: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s ;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .item:hover {
      background:null;
      transform: scale(1.05);
      transition: transform 0.2s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .search-icon {
      width: 80px;
      height: 50px;
      stroke: white;
      stroke-width: 2;
      fill: none;
      position: absolute;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      transform: scale(0.8);
    }
    .item:hover .search-icon {
      opacity: 1;
      transform: scale(2);
    }
      .item:hover{
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
          transition: transform 0.3s ease, box-shadow 0.3s ease; 

      }
    
    .item-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-size: 0.9rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.7);
      z-index: 2;
      background: rgba(0, 0, 0, 0.4);
      padding: 4px 8px;
      border-radius: 4px;
    }
    .item-1{
        grid-column: 1 / span 3;
        grid-row: 1 / span 2;
        background-image: url('https://images.unsplash.com/photo-1519451241324-20b4ea2c4220?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
    }
    .item-2{
        grid-column: 1 / span 2;
        grid-row: 5 / span 4;
        background-image: url('https://images.unsplash.com/photo-1514282401047-d79a71a590e8?q=80&w=765&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
    }
    .item-3{
        grid-column: 1 / 2;
        grid-row: 3 / span 2;
        background-image: url('https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
    }
    .item-4{
        grid-column: 2 / span 2;
        grid-row: 3 / span 1;
        background-image: url('https://images.unsplash.com/flagged/photo-1559717201-fbb671ff56b7?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');

    }
    .item-5{
        grid-column: 1 / span ;
        grid-row: 5 / span 4;
        background-image: url('https://images.unsplash.com/photo-1570161766218-f8488ebb8078?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
        }
    .item-6{
        grid-column: 2 / 4;
        grid-row: 4 / 5; 
        background-image: url('https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');

    }
    </style>
    
</body>

</html>
